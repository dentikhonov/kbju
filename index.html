<style>
  :root {
    --bg: #fafaf7;
    --card: #ffffff;
    --ink: #1c1c1a;
    --muted: #8a8a82;
    --line: #e7e7e0;
    --accent: #2f6b3f;
    --accent-soft: #eaf2ec;
    --danger: #b0413e;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }
  button, input { touch-action: manipulation; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 48px;
    font-size: 16px;
    line-height: 1.45;
  }
  header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px;
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .gear {
    background: none; border: none; font-size: 20px; cursor: pointer;
    color: var(--muted); padding: 4px;
  }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
  }
  .btn {
    display: block; width: 100%; padding: 14px; border: none;
    border-radius: var(--radius); font-size: 17px; font-weight: 600;
    cursor: pointer; background: var(--accent); color: #fff;
  }
  .btn:disabled { opacity: 0.5; }
  .btn.secondary { background: var(--accent-soft); color: var(--accent); }
  .btn.ghost { background: none; color: var(--muted); font-weight: 500; font-size: 14px; padding: 8px; }
  input {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line);
    border-radius: 10px; font-size: 16px; background: #fff; color: var(--ink);
  }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 5px; }
  label:first-child { margin-top: 0; }

  #preview { width: 100%; border-radius: 10px; margin-bottom: 12px; display: block; }
  .dish-name { font-weight: 700; font-size: 17px; }
  .dish-note { color: var(--muted); font-size: 13px; margin: 2px 0 12px; }
  .macros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .macro { text-align: center; }
  .macro input {
    text-align: center; padding: 8px 4px; font-size: 17px; font-weight: 700;
    -moz-appearance: textfield;
  }
  .macro input::-webkit-outer-spin-button, .macro input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .macro span { display: block; font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .row { display: flex; gap: 10px; margin-top: 14px; }
  .row .btn { flex: 1; }

  .day-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin: 22px 0 8px; padding: 0 2px;
  }
  .day-title { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .day-total { font-size: 14px; font-weight: 700; }
  .day-total small { color: var(--muted); font-weight: 500; }
  .entry {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
  }
  .entry-info { min-width: 0; }
  .entry-name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-macros { font-size: 12.5px; color: var(--muted); }
  .entry-kcal { font-weight: 700; white-space: nowrap; }
  .entry-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }

  .status { text-align: center; color: var(--muted); padding: 14px; font-size: 14px; }
  .error { color: var(--danger); font-size: 14px; margin-top: 10px; white-space: pre-wrap; }
  .hidden { display: none !important; }
  .spinner {
    width: 22px; height: 22px; border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; margin: 0 auto 8px; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 2s; } }

  /* standalone: контент не должен заезжать под чёлку и home-индикатор */
  @media (display-mode: standalone) {
    body {
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-bottom: calc(48px + env(safe-area-inset-bottom));
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      user-select: none;
      -webkit-user-select: none;
    }
    input { user-select: text; -webkit-user-select: text; }
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161614;
      --card: #1f1f1c;
      --ink: #ecece6;
      --muted: #8f8f86;
      --line: #32322d;
      --accent: #5da672;
      --accent-soft: #24352a;
      --danger: #d97a76;
    }
    input { background: var(--card); }
    .btn { color: #10160f; }
    .btn.secondary { color: var(--accent); }
    .btn.ghost { color: var(--muted); }
  }
  :root[data-theme="dark"] {
    --bg: #161614;
    --card: #1f1f1c;
    --ink: #ecece6;
    --muted: #8f8f86;
    --line: #32322d;
    --accent: #5da672;
    --accent-soft: #24352a;
    --danger: #d97a76;
  }
  :root[data-theme="dark"] input { background: var(--card); }
  :root[data-theme="dark"] .btn { color: #10160f; }
  :root[data-theme="dark"] .btn.secondary { color: var(--accent); }
  :root[data-theme="dark"] .btn.ghost { color: var(--muted); }
  :root[data-theme="light"] {
    --bg: #fafaf7;
    --card: #ffffff;
    --ink: #1c1c1a;
    --muted: #8a8a82;
    --line: #e7e7e0;
    --accent: #2f6b3f;
    --accent-soft: #eaf2ec;
    --danger: #b0413e;
  }
  :root[data-theme="light"] input { background: #fff; }
  :root[data-theme="light"] .btn { color: #fff; }
  :root[data-theme="light"] .btn.secondary { color: var(--accent); }
  :root[data-theme="light"] .btn.ghost { color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>КБЖУ по фото</h1>
  <button class="gear" id="btnSettings" title="Настройки">⚙︎</button>
</header>

<!-- Настройки / первый вход -->
<div class="card hidden" id="settings">
  <label>API-ключ Gemini (aistudio.google.com/apikey)</label>
  <input id="apiKey" type="password" placeholder="AIza..." autocomplete="off">
  <label>Модель</label>
  <input id="model" type="text" value="gemini-2.5-flash">
  <div class="row">
    <button class="btn" id="btnSaveSettings">Сохранить</button>
  </div>
  <button class="btn ghost" id="btnClearAll">Стереть все данные (ключ и дневник)</button>
</div>

<!-- Главный экран -->
<div id="main" class="hidden">
  <input type="file" id="file" accept="image/*" capture="environment" class="hidden">
  <button class="btn" id="btnPhoto">📷 Сфотографировать еду</button>

  <div class="card hidden" id="loading" style="margin-top:14px">
    <div class="spinner"></div>
    <div class="status">Анализирую фото…</div>
  </div>

  <div class="error hidden" id="error"></div>

  <!-- Результат -->
  <div class="card hidden" id="result" style="margin-top:14px">
    <img id="preview" alt="Фото блюда">
    <div class="dish-name" id="dishName"></div>
    <div class="dish-note" id="dishNote"></div>
    <div class="macros">
      <div class="macro"><input id="mKcal" type="number" inputmode="numeric"><span>ккал</span></div>
      <div class="macro"><input id="mProt" type="number" inputmode="numeric"><span>белки</span></div>
      <div class="macro"><input id="mFat"  type="number" inputmode="numeric"><span>жиры</span></div>
      <div class="macro"><input id="mCarb" type="number" inputmode="numeric"><span>углев.</span></div>
    </div>
    <div class="row">
      <button class="btn secondary" id="btnDiscard">Отмена</button>
      <button class="btn" id="btnSave">Записать</button>
    </div>
  </div>

  <div id="log"></div>
</div>

<script>
(() => {
  const LS_KEY = 'kbju_key', LS_MODEL = 'kbju_model', LS_LOG = 'kbju_log';
  const $ = id => document.getElementById(id);
  let pending = null;

  // ---------- настройки ----------
  const getKey = () => localStorage.getItem(LS_KEY) || '';
  const getModel = () => localStorage.getItem(LS_MODEL) || 'gemini-2.5-flash';

  function showSettings(show) {
    $('settings').classList.toggle('hidden', !show);
    $('main').classList.toggle('hidden', show);
    if (show) { $('apiKey').value = getKey(); $('model').value = getModel(); }
  }

  $('btnSettings').onclick = () => showSettings($('settings').classList.contains('hidden'));

  $('btnSaveSettings').onclick = () => {
    const key = $('apiKey').value.trim();
    if (!key) { alert('Введите API-ключ'); return; }
    localStorage.setItem(LS_KEY, key);
    localStorage.setItem(LS_MODEL, $('model').value.trim() || 'gemini-2.5-flash');
    showSettings(false);
  };

  $('btnClearAll').onclick = () => {
    if (confirm('Точно стереть ключ и весь дневник?')) {
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(LS_MODEL);
      localStorage.removeItem(LS_LOG);
      location.reload();
    }
  };

  // ---------- хранилище (localStorage) ----------
  const loadLog = () => { try { return JSON.parse(localStorage.getItem(LS_LOG)) || []; } catch { return []; } };
  const saveLog = log => localStorage.setItem(LS_LOG, JSON.stringify(log));

  // ---------- фото ----------
  $('btnPhoto').onclick = () => $('file').click();

  $('file').onchange = async (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    hideError();
    $('result').classList.add('hidden');
    $('loading').classList.remove('hidden');
    try {
      const { dataUrl, base64 } = await resizeImage(file, 1024);
      const res = await analyze(base64);
      pending = { ...res, thumb: dataUrl };
      showResult(pending);
    } catch (err) {
      showError(err.message || String(err));
    } finally {
      $('loading').classList.add('hidden');
    }
  };

  function resizeImage(file, maxSide) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const c = document.createElement('canvas');
        c.width = Math.round(img.width * scale);
        c.height = Math.round(img.height * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        const dataUrl = c.toDataURL('image/jpeg', 0.8);
        URL.revokeObjectURL(img.src);
        resolve({ dataUrl, base64: dataUrl.split(',')[1] });
      };
      img.onerror = () => reject(new Error('Не удалось прочитать изображение'));
      img.src = URL.createObjectURL(file);
    });
  }

  // ---------- Gemini API ----------
  async function analyze(base64) {
    const prompt = `На фото еда. Оцени порцию и верни ТОЛЬКО JSON без пояснений и без markdown:
{"name":"краткое название блюда по-русски","note":"оценка веса и состав, кратко","kcal":число,"prot":число,"fat":число,"carb":число}
kcal — калории всей порции на фото, prot/fat/carb — граммы белков/жиров/углеводов всей порции. Если на фото не еда — {"error":"описание"}.`;

    const url = `https://generativelanguage.googleapis.com/v1beta/models/${getModel()}:generateContent?key=${encodeURIComponent(getKey())}`;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { inline_data: { mime_type: 'image/jpeg', data: base64 } },
          { text: prompt }
        ]}],
        generationConfig: { response_mime_type: 'application/json', temperature: 0.2 }
      })
    });

    if (!resp.ok) {
      let msg = `Ошибка API (${resp.status})`;
      try { msg += ': ' + (await resp.json()).error.message; } catch {}
      if (resp.status === 400 || resp.status === 403) msg += '\nПроверь API-ключ в настройках (⚙︎).';
      throw new Error(msg);
    }
    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.map(p => p.text).join('') || '';
    let parsed;
    try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
    catch { throw new Error('Не удалось разобрать ответ модели:\n' + text.slice(0, 300)); }
    if (parsed.error) throw new Error(parsed.error);
    return {
      name: parsed.name || 'Блюдо',
      note: parsed.note || '',
      kcal: Math.round(+parsed.kcal || 0),
      prot: Math.round(+parsed.prot || 0),
      fat:  Math.round(+parsed.fat  || 0),
      carb: Math.round(+parsed.carb || 0)
    };
  }

  // ---------- результат ----------
  function showResult(r) {
    $('preview').src = r.thumb;
    $('dishName').textContent = r.name;
    $('dishNote').textContent = r.note;
    $('mKcal').value = r.kcal; $('mProt').value = r.prot;
    $('mFat').value  = r.fat;  $('mCarb').value = r.carb;
    $('result').classList.remove('hidden');
  }

  $('btnDiscard').onclick = () => { pending = null; $('result').classList.add('hidden'); };

  $('btnSave').onclick = () => {
    if (!pending) return;
    const log = loadLog();
    log.push({
      id: Date.now(),
      ts: new Date().toISOString(),
      name: $('dishName').textContent,
      kcal: +$('mKcal').value || 0,
      prot: +$('mProt').value || 0,
      fat:  +$('mFat').value  || 0,
      carb: +$('mCarb').value || 0
    });
    saveLog(log);
    pending = null;
    $('result').classList.add('hidden');
    renderLog();
  };

  // ---------- дневник ----------
  function dayLabel(dateStr) {
    const d = new Date(dateStr), today = new Date();
    const yest = new Date(today); yest.setDate(today.getDate() - 1);
    const same = (a, b) => a.toDateString() === b.toDateString();
    if (same(d, today)) return 'Сегодня';
    if (same(d, yest)) return 'Вчера';
    return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
  }

  function renderLog() {
    const log = loadLog().sort((a, b) => b.id - a.id);
    const box = $('log');
    box.innerHTML = '';
    if (!log.length) {
      box.innerHTML = '<div class="status">Пока пусто. Сфотографируй первое блюдо.</div>';
      return;
    }
    const byDay = {};
    for (const e of log) {
      const day = new Date(e.ts).toDateString();
      (byDay[day] ||= []).push(e);
    }
    for (const day of Object.keys(byDay)) {
      const entries = byDay[day];
      const t = entries.reduce((a, e) => ({
        kcal: a.kcal + e.kcal, prot: a.prot + e.prot, fat: a.fat + e.fat, carb: a.carb + e.carb
      }), { kcal: 0, prot: 0, fat: 0, carb: 0 });

      const head = document.createElement('div');
      head.className = 'day-head';
      head.innerHTML = `<span class="day-title">${dayLabel(entries[0].ts)}</span>
        <span class="day-total">${t.kcal} ккал <small>· Б${t.prot} Ж${t.fat} У${t.carb}</small></span>`;
      box.appendChild(head);

      for (const e of entries) {
        const el = document.createElement('div');
        el.className = 'entry';
        el.innerHTML = `
          <div class="entry-info">
            <div class="entry-name"></div>
            <div class="entry-macros">Б ${e.prot} · Ж ${e.fat} · У ${e.carb}</div>
          </div>
          <div class="entry-kcal">${e.kcal}</div>
          <button class="entry-del" title="Удалить">✕</button>`;
        el.querySelector('.entry-name').textContent = e.name;
        el.querySelector('.entry-del').onclick = () => {
          saveLog(loadLog().filter(x => x.id !== e.id));
          renderLog();
        };
        box.appendChild(el);
      }
    }
  }

  // ---------- ошибки ----------
  const showError = msg => { const el = $('error'); el.textContent = msg; el.classList.remove('hidden'); };
  const hideError = () => $('error').classList.add('hidden');

  // ---------- старт ----------
  if (!getKey()) showSettings(true); else $('main').classList.remove('hidden');
  renderLog();
})();
</script>
